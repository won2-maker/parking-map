<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Malgun Gothic',sans-serif}
#map{width:100%;height:100vh}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c320a15a913f1ca4499435481f4b897e&autoload=false"></script>
<script>
// URL 파라미터에서 데이터 읽기
var params=new URLSearchParams(window.location.search);
var lat=parseFloat(params.get('lat'))||37.5665;
var lng=parseFloat(params.get('lng'))||126.978;
var radius=parseInt(params.get('radius'))||500;
var lotsJson=params.get('lots')||'[]';

kakao.maps.load(function(){
  var center=new kakao.maps.LatLng(lat,lng);
  var map=new kakao.maps.Map(document.getElementById('map'),{center:center,level:4});
  map.addControl(new kakao.maps.ZoomControl(),kakao.maps.ControlPosition.RIGHT);

  // 기준점 마커
  var cm=new kakao.maps.Marker({map:map,position:center});
  new kakao.maps.InfoWindow({
    content:'<div style="padding:4px 8px;font-size:11px;font-weight:700;color:#ef4444;white-space:nowrap">📍 분석 지점</div>'
  }).open(map,cm);

  // 반경 원
  new kakao.maps.Circle({
    center:center,radius:radius,
    strokeWeight:2,strokeColor:'#6366f1',strokeOpacity:0.6,strokeStyle:'dashed',
    fillColor:'#6366f1',fillOpacity:0.06
  }).setMap(map);

  // 주차장 마커
  var lots=[];
  try{lots=JSON.parse(decodeURIComponent(lotsJson));}catch(e){}
  var curIW=null;

  lots.forEach(function(lot){
    if(!lot.lat||!lot.lng)return;
    var hasRev=(lot.rev||0)>0;
    var mk=new kakao.maps.Marker({
      map:map,
      position:new kakao.maps.LatLng(lot.lat,lot.lng),
      image:new kakao.maps.MarkerImage(
        hasRev?'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png'
              :'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png',
        new kakao.maps.Size(hasRev?24:20,hasRev?35:29)
      )
    });

    var FW=function(n){if(!n||n===0)return'-';if(n>=1e8)return(n/1e8).toFixed(1)+'억';if(n>=1e4)return(n/1e4).toFixed(1)+'만';return n.toLocaleString()};

    var content='<div style="padding:8px 12px;font-size:12px;min-width:180px;line-height:1.6;font-family:-apple-system,Malgun Gothic,sans-serif">'
      +'<b style="color:#4338ca">'+lot.name+'</b><br>'
      +'📏 '+lot.dist+'m · 🅿️ '+(lot.spots||'?')+'면<br>';
    if(hasRev){
      content+='<span style="color:#6366f1">월정기 '+FW(lot.mRev)+'</span>'
        +' · <span style="color:#f59e0b">기타 '+FW(lot.oRev)+'</span><br>'
        +'<b style="color:#dc2626">합계 '+FW(lot.rev)+'</b>';
    } else {
      content+='<span style="color:#9ca3af">매출 데이터 없음</span>';
    }
    content+='</div>';

    var iw=new kakao.maps.InfoWindow({content:content});
    kakao.maps.event.addListener(mk,'click',function(){
      if(curIW)curIW.close();
      iw.open(map,mk);curIW=iw;
    });
    kakao.maps.event.addListener(mk,'mouseover',function(){iw.open(map,mk);});
    kakao.maps.event.addListener(mk,'mouseout',function(){if(curIW!==iw)iw.close();});
  });
});
</script>
</body>
</html>
